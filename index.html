<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Space Bio | @TwójNick</title>
    <style>
        /* Fundamenty i tło kosmiczne */
        body {
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: radial-gradient(circle at center, #1b2735 0%, #090a0f 100%);
            color: white;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            overflow: hidden;
        }

        /* Animowane gwiazdy w tle */
        .stars {
            position: absolute;
            width: 100%;
            height: 100%;
            background: url('https://www.transparenttextures.com/patterns/stardust.png');
            z-index: -1;
            animation: moveStars 100s linear infinite;
        }

        @keyframes moveStars {
            from { background-position: 0 0; }
            to { background-position: 1000px 1000px; }
        }

        /* Główny kontener (Glassmorphism) */
        .container {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(15px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            padding: 40px;
            border-radius: 20px;
            text-align: center;
            width: 350px;
            box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.8);
        }

        .profile-img {
            width: 100px;
            height: 100px;
            border-radius: 50%;
            border: 3px solid #7289da;
            margin-bottom: 15px;
            transition: transform 0.3s ease;
        }

        .profile-img:hover {
            transform: scale(1.1) rotate(5deg);
        }

        h1 {
            margin: 10px 0;
            font-size: 24px;
            letter-spacing: 2px;
            text-transform: uppercase;
        }

        p {
            color: #ccc;
            font-size: 14px;
            margin-bottom: 30px;
        }

        /* Przyciski */
        .links {
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        .link {
            text-decoration: none;
            color: white;
            background: rgba(255, 255, 255, 0.1);
            padding: 12px;
            border-radius: 10px;
            transition: all 0.3s ease;
            border: 1px solid transparent;
            font-weight: bold;
        }

        .link:hover {
            background: rgba(255, 255, 255, 0.2);
            border: 1px solid #7289da;
            transform: translateY(-3px);
            box-shadow: 0 0 15px rgba(114, 137, 218, 0.4);
        }

        /* Kolory specyficzne dla social mediów */
        .discord:hover { border-color: #7289da; color: #7289da; }
        .youtube:hover { border-color: #ff0000; color: #ff0000; }
        .instagram:hover { border-color: #e1306c; color: #e1306c; }

    </style>
</head>
<body>

    <div class="stars"></div>

    <div class="container">
        <img src="https://via.placeholder.com/100" alt="Avatar" class="profile-img">
        
        <h1>Twój Nick</h1>
        <p>Eksplorator cyfrowego kosmosu 🚀</p>

        <div class="links">
            <a href="https://discord.gg/TWÓJ_LINK" target="_blank" class="link discord">DISCORD</a>
            <a href="https://youtube.com/@TWÓJ_KANAŁ" target="_blank" class="link youtube">YOUTUBE</a>
            <a href="https://instagram.com/TWÓJ_PROFIL" target="_blank" class="link instagram">INSTAGRAM</a>
            <a href="#" class="link">PORTFOLIO</a>
        </div>
    </div>

</body>
</html>
