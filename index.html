<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SPAZMA VIBE | @TwojNick</title>
    <link href="https://fonts.googleapis.com/css2?family=Syncopate:wght@400;700&family=Space+Grotesk:wght@300;500&display=swap" rel="stylesheet">
    <style>
        :root {
            --dark: #020205;
            --purple-glow: #7a2ff7;
            --deep-purple: #2d004d;
            --text-color: #e0e0e0;
        }

        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            background-color: var(--dark);
            color: var(--text-color);
            font-family: 'Space Grotesk', sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
        }

        /* Tło z efektem mgławicy */
        .bg-overlay {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: 
                radial-gradient(circle at 20% 30%, rgba(122, 47, 247, 0.15) 0%, transparent 40%),
                radial-gradient(circle at 80% 70%, rgba(45, 0, 77, 0.3) 0%, transparent 40%);
            z-index: -1;
        }

        /* Animowane gwiazdy */
        .stars-container {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: url('https://www.transparenttextures.com/patterns/stardust.png');
            opacity: 0.4;
            z-index: -1;
            animation: starsMove 200s linear infinite;
        }

        @keyframes starsMove {
            from { background-position: 0 0; }
            to { background-position: 5000px 5000px; }
        }

        /* Główny kontener */
        .profile-card {
            position: relative;
            background: rgba(10, 10, 15, 0.7);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid rgba(122, 47, 247, 0.3);
            border-radius: 30px;
            padding: 50px;
            width: 380px;
            text-align: center;
            box-shadow: 0 0 80px rgba(0, 0, 0, 0.5), 0 0 30px rgba(122, 47, 247, 0.1);
            animation: float 6s ease-in-out infinite;
        }

        @keyframes float {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-20px); }
        }

        .avatar {
            width: 120px;
            height: 120px;
            border-radius: 50%;
            border: 2px solid var(--purple-glow);
            padding: 5px;
            filter: drop-shadow(0 0 15px var(--purple-glow));
            margin-bottom: 20px;
        }

        h1 {
            font-family: 'Syncopate', sans-serif;
            font-size: 22px;
            letter-spacing: 4px;
            margin: 10px 0;
            text-transform: uppercase;
            background: linear-gradient(to right, #fff, var(--purple-glow));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .lyrics-status {
            font-size: 11px;
            color: #888;
            margin-bottom: 30px;
            letter-spacing: 1px;
            font-style: italic;
        }

        /* Linki w stylu mrocznego kosmosu */
        .links-wrap {
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        .btn {
            text-decoration: none;
            color: #fff;
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(122, 47, 247, 0.2);
            padding: 15px;
            border-radius: 15px;
            font-weight: 500;
            letter-spacing: 1px;
            transition: 0.4s;
        }

        .btn:hover {
            background: rgba(122, 47, 247, 0.15);
            border-color: var(--purple-glow);
            box-shadow: 0 0 20px rgba(122, 47, 247, 0.4);
            transform: scale(1.05);
        }

        /* Muzyka - Spazma Style */
        .audio-player {
            margin-top: 40px;
            cursor: pointer;
            display: inline-flex;
            align-items: center;
            gap: 10px;
            color: var(--purple-glow);
            font-weight: bold;
            font-size: 14px;
            text-transform: uppercase;
        }

        .visualizer {
            display: flex;
            gap: 3px;
            height: 15px;
            align-items: flex-end;
        }

        .bar {
            width: 3px;
            background: var(--purple-glow);
            animation: bounce 1s ease-in-out infinite;
        }

        @keyframes bounce {
            0%, 100% { height: 5px; }
            50% { height: 15px; }
        }

    </style>
</head>
<body>

<div class="bg-overlay"></div>
<div class="stars-container"></div>

<div class="profile-card">
    <img src="https://via.placeholder.com/150/000000/7a2ff7?text=USER" alt="Avatar" class="avatar">
    
    <h1>TWOJA NAZWA</h1>
    <div class="lyrics-status">"Mam w piździe siano nie jest pierwsze na liście..."</div>

    <div class="links-wrap">
        <a href="TWÓJ_LINK" target="_blank" class="btn">DISCORD SERVER</a>
        <a href="TWÓJ_LINK" target="_blank" class="btn">YOUTUBE CHANNEL</a>
        <a href="TWÓJ_LINK" target="_blank" class="btn">INSTAGRAM</a>
    </div>

    <div class="audio-player" onclick="toggleAudio()">
        <div class="visualizer" id="viz">
            <div class="bar" style="animation-delay: 0.1s"></div>
            <div class="bar" style="animation-delay: 0.3s"></div>
            <div class="bar" style="animation-delay: 0.2s"></div>
        </div>
        <span id="play-text">PLAY SPAZMA</span>
    </div>
</div>

<audio id="track" loop>
    <source src="LINK_DO_PLIKU_MP3" type="audio/mpeg">
</audio>

<script>
    const song = document.getElementById('track');
    const playText = document.getElementById('play-text');
    const viz = document.getElementById('viz');

    function toggleAudio() {
        if (song.paused) {
            song.play();
            playText.innerText = "NOW PLAYING";
            viz.style.display = "flex";
        } else {
            song.pause();
            playText.innerText = "PAUSED";
            viz.style.display = "none";
        }
    }
</script>

</body>
</html>
